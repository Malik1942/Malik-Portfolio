<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.jpeg">
    <link rel="apple-touch-icon" href="/favicon.jpeg" />
    <!-- crossorigin on Fontshare needed for cross-origin font requests -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Keep these as render-blocking stylesheets: the loading screen covers the page
         while they load, and document.fonts.ready (used by the loading screen AND DotGrid)
         only sees fonts that are already in the stylesheet cascade — async loading would
         cause fonts.ready to resolve before Space Grotesk is in the queue. -->
    <!-- General Sans (display + body) -->
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700&display=swap" rel="stylesheet">
    <!-- JetBrains Mono (mono) + Space Grotesk (canvas text in DotGrid) -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- TODO: Set the document title to the name of your application -->
    <title>Malik Zhang – Product Designer | Seattle | UW MHCI+D</title>
    <meta name="description" content="Product Designer designing products that bridge human needs and digital possibilities.">
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->

         React has rendered and fonts are ready. Background matches --background. -->
    <div id="loading-screen" style="
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #0a0a0a;
      transition: opacity 0.45s ease;
    "></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
